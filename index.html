<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XiangKe Fake Map</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#FFF8F1;
}

header {
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.hero {
  text-align:center;
  padding:20px;
}

#map {
  height:500px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/7/79/Taiwan_location_map.svg') center/contain no-repeat;
  position:relative;
}

.dot {
  width:12px;
  height:12px;
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0% {transform:translate(-50%,-50%) scale(1);}
  50% {transform:translate(-50%,-50%) scale(1.5);}
  100% {transform:translate(-50%,-50%) scale(1);}
}

main {
  display:grid;
  grid-template-columns:1fr 320px;
}

.panel { padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <div>🍽️ 饗客智擎</div>
  <div>● 模擬地圖雷達</div>
</header>

<section class="hero">
  <input id="keywordInput" placeholder="輸入關鍵字">
  <button onclick="searchKeyword()">搜尋</button>
</section>

<main>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">
  <div id="mainResult" class="card">等待分析...</div>
</div>

</main>

<script>

const cities=[
  {name:"台北",x:50,y:20},
  {name:"台中",x:45,y:45},
  {name:"高雄",x:48,y:75}
];

const foods=["雞排","飲料","火鍋","甜點"];

// 🔥 主結果
function showResult(text){

  const score = Math.floor(Math.random()*40)+60;

  document.getElementById("mainResult").innerHTML=`
    <b>${text}</b><br>
    <div style="font-size:30px;color:#F59E0B">${score}分</div>
    市場熱度上升
  `;
}

// 🔥 生成點
function spawn(){

  const map=document.getElementById("map");

  const city=cities[Math.floor(Math.random()*cities.length)];
  const food=foods[Math.floor(Math.random()*foods.length)];

  const dot=document.createElement("div");
  dot.className="dot";

  dot.style.left=city.x+"%";
  dot.style.top=city.y+"%";

  dot.style.background=Math.random()>0.5?"green":"red";

  dot.onclick=()=>{
    showResult(city.name+"｜"+food);
  };

  map.appendChild(dot);

  setTimeout(()=>dot.remove(),3000);
}

setInterval(spawn,2000);

// 搜尋
function searchKeyword(){

  const input=document.getElementById("keywordInput").value;
  if(!input) return;

  showResult("🔍 "+input);
}

// Enter
document.getElementById("keywordInput")
  .addEventListener("keypress",function(e){
    if(e.key==="Enter") searchKeyword();
});

</script>

</body>
</html>
