<script>

window.onload = function(){

  const cities=[
    {name:"台北",x:50,y:20},
    {name:"台中",x:45,y:45},
    {name:"高雄",x:48,y:75}
  ];

  const foods=["雞排","飲料","火鍋","甜點"];

  let rankingData={};

  const map=document.getElementById("map");

  // 初始化點
  cities.forEach(city=>{
    const dot=document.createElement("div");
    dot.className="dot";

    dot.style.left=city.x+"%";
    dot.style.top=city.y+"%";
    dot.style.background="orange";

    dot.onclick=()=>{
      const food=foods[Math.floor(Math.random()*foods.length)];
      showResult(city.name+"｜"+food);
    };

    map.appendChild(dot);
  });

  // 顯示結果
  function showResult(title){

    const score = Math.floor(Math.random()*40)+60;

    let color = score>85?"green":score<70?"red":"#F59E0B";

    document.getElementById("mainResult").innerHTML=`
      <b>${title}</b><br>
      <div style="font-size:30px;color:${color}">
        ${score}分
      </div>
    `;

    updateRanking(title,score);
  }

  // 排行榜
  function updateRanking(name,score){

    rankingData[name]=score;

    const sorted = Object.entries(rankingData)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5);

    let html="<b>🔥 熱門排行榜</b><br>";

    sorted.forEach((item,i)=>{
      html+=`${["🥇","🥈","🥉"][i]||""} ${item[0]} (${item[1]}分)<br>`;
    });

    document.getElementById("ranking").innerHTML=html;
  }

  // 搜尋
  window.searchKeyword=function(){

    const input=document.getElementById("keywordInput").value;
    if(!input) return;

    showResult("🔍 "+input);
  }

  // Enter
  document.getElementById("keywordInput")
    .addEventListener("keypress",function(e){
      if(e.key==="Enter") searchKeyword();
    });

  // 自動跑（低頻）
  setInterval(()=>{
    const city=cities[Math.floor(Math.random()*cities.length)];
    const food=foods[Math.floor(Math.random()*foods.length)];
    showResult(city.name+"｜"+food);
  },6000);

};

</script>
