<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiangKe Food Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#FFF8F1;
}

header {
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

.hero {
  text-align:center;
  padding:20px;
}

#map {
  height:500px;
  width:100%;
  border-radius:10px;
}

main {
  display:grid;
  grid-template-columns:1fr 300px;
}

.panel {
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <div>🍽️ 饗客智擎</div>
  <div>● 穩定版</div>
</header>

<section class="hero">
  <input id="keywordInput" placeholder="輸入關鍵字">
  <button onclick="searchKeyword()">搜尋</button>
</section>

<main>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">
  <div id="mainResult" class="card">等待分析...</div>
</div>

</main>

<script>

let map;

// ✅ DOM完成後初始化
document.addEventListener("DOMContentLoaded", function(){

  const mapEl = document.getElementById("map");

  map = L.map(mapEl).setView([23.7,121],7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // 🔥 修灰畫面
  setTimeout(()=>{
    map.invalidateSize();
  },500);

});

// 📍 資料
const cities=[
  {name:"台北",lat:25.03,lng:121.56},
  {name:"台中",lat:24.15,lng:120.67},
  {name:"高雄",lat:22.63,lng:120.30}
];

const foods=["雞排","飲料","火鍋","拉麵","甜點"];

// 🔥 地圖事件（穩）
function spawnMapEvent(){

  if(!map) return;

  const city=cities[Math.floor(Math.random()*cities.length)];
  const food=foods[Math.floor(Math.random()*foods.length)];

  const marker=L.circleMarker([city.lat,city.lng],{
    radius:8,
    color:"orange",
    fillOpacity:0.7
  }).addTo(map);

  marker.on("click",()=>{

    const score = Math.floor(Math.random()*40)+60;

    document.getElementById("mainResult").innerHTML=`
      <b>${city.name}｜${food}</b><br>
      <div style="font-size:30px;color:#F59E0B">${score}分</div>
      市場需求上升
    `;
  });

  setTimeout(()=>{
    if(map && map.hasLayer(marker)){
      map.removeLayer(marker);
    }
  },4000);
}

// ❗ 降頻避免爆
setInterval(spawnMapEvent,4000);

// 🔍 搜尋
function searchKeyword(){
  const input=document.getElementById("keywordInput").value;
  if(!input) return;

  const score = Math.floor(Math.random()*40)+60;

  document.getElementById("mainResult").innerHTML=`
    <b>🔍 ${input}</b><br>
    <div style="font-size:30px;color:#F59E0B">${score}分</div>
    市場需求上升
  `;
}

// Enter
document.getElementById("keywordInput")
  .addEventListener("keypress",function(e){
    if(e.key==="Enter") searchKeyword();
});

</script>

</body>
</html>
