<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饗客智擎 AI 雷達 - 清晰層次版</title>
<style>
  /* 品牌基礎視覺 */
  body { background-color: #FFF8E7; margin: 0; font-family: sans-serif; color: #333; overflow-x: hidden; }
  header { padding: 15px; background: #222; color: #F2B705; text-align: center; border-bottom: 2px solid #F2B705; font-size: 1.2em; letter-spacing: 2px; }

  /* Hybrid 佈局設計 */
  .hybrid-layout {
    display: flex;
    flex-wrap: wrap;
    max-width: 1400px;
    margin: 20px auto;
    gap: 20px;
    padding: 0 20px;
  }

  /* 左側：動畫引擎區 */
  .radar-section {
    flex: 1 1 600px; 
    position: relative;
    height: 500px;
    background-color: #1a1a1a;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/79/Taiwan_location_map.svg');
    background-position: center;
    background-size: contain;
    background-repeat: no-repeat;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #333;
    box-shadow: inset 0 0 50px rgba(0,0,0,0.9);
  }
  
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  /* 右側：DOM 資訊顯示區 */
  .info-section {
    flex: 1 1 350px; 
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    border-top: 5px solid #F2B705;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  }

  .controls { margin-bottom: 20px; display: flex; gap: 8px; }
  .controls input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; outline: none; }
  .controls button { padding: 10px 20px; background-color: #F2B705; color: #222; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  .controls button:hover { background-color: #d19b00; transform: translateY(-2px); }
  
  .ranking-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 1.1em; }
</style>
</head>
<body>

<header><b>🍽️ 饗客智擎（AI市場雷達 - 清晰層次優化版）</b></header>

<div class="hybrid-layout">
  <div class="radar-section" id="radar-container">
    <canvas id="radarCanvas"></canvas>
  </div>

  <div class="info-section">
    <div class="card">
      <div class="controls">
        <input type="text" id="keywordInput" placeholder="輸入關鍵字偵測...">
        <button onclick="triggerScan(null, true)">啟動掃描</button>
      </div>
      <h3 style="margin-top:0;">📡 實時攔截訊號</h3>
      <div id="intercept-content" style="color:#666;">雷達監控中...</div>
    </div>
    
    <div class="card">
      <h3 style="margin-top:0;">🔥 戰略機會熱度榜</h3>
      <div id="ranking-content">分析中...</div>
    </div>
  </div>
</div>

<script>
// ==========================================
// 1. 系統狀態管理
// ==========================================
const radarState = {
  angle: 0,
  pings: [],
  heatmap: [],
  rankings: {},
  lastHitZone: null,
  cities: [
    { name: '台北', x: 0.52, y: 0.22, targetAngle: 4.8 }, 
    { name: '台中', x: 0.44, y: 0.46, targetAngle: 5.8 },
    { name: '高雄', x: 0.45, y: 0.76, targetAngle: 0.6 }
  ],
  keywords: ["尋找高雄宵夜", "黃金三角切法", "獨門死神辣椒秘方", "炸 3 分鐘定律"],
  sources: ["Threads", "PTT", "Dcard", "IG"],
  searchHistory: []
};

// 🔥 任務三：新增掃描觸發冷卻時間
let lastHeatTime = 0;

const canvas = document.getElementById('radarCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const container = document.getElementById('radar-container');
  if(!container) return;
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// 熱度衰減
setInterval(() => {
  radarState.heatmap.forEach(h => h.intensity -= 0.1);
  radarState.heatmap = radarState.heatmap.filter(h => h.intensity > 0);
}, 2000);

// ==========================================
// 2. 核心渲染管線
// ==========================================
function drawRadar() {
  const cw = canvas.width;
  const ch = canvas.height;
  if(cw === 0) return;

  const centerX = cw / 2;
  const centerY = ch / 2;
  const radius = Math.min(cw, ch) * 0.9;

  ctx.clearRect(0, 0, cw, ch);

  // 第一層：Heatmap 熱區 (優化：🔥 ② 縮小範圍 ＆ 降低透明度)
  radarState.heatmap.forEach(p => {
    const x = p.x * cw;
    const y = p.y * ch;
    const size = 15 + (p.intensity * 12); // 修復：縮小視覺半徑
    const alpha = Math.min(p.intensity * 0.25, 0.5); // 優化：降低透明度
    
    const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
    grad.addColorStop(0, `rgba(242, 183, 5, ${alpha})`);
    grad.addColorStop(1, 'rgba(242, 183, 5, 0)');
    
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // 第二層：背景網格
  ctx.strokeStyle = 'rgba(242, 183, 5, 0.12)';
  ctx.lineWidth = 1;
  for(let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius * (i/4), 0, Math.PI * 2);
    ctx.stroke();
  }

  // 第三層：雷達掃描線與偵測
  radarState.angle += 0.025;
  detectHitByAngle(); 

  ctx.save();
  ctx.translate(centerX, centerY);
  ctx.rotate(radarState.angle);
  const sweepGrad = ctx.createLinearGradient(0, 0, radius, 0);
  sweepGrad.addColorStop(0, 'rgba(242, 183, 5, 0.6)');
  sweepGrad.addColorStop(1, 'rgba(242, 183, 5, 0)');
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.arc(0, 0, radius, 0, -0.6); 
  ctx.lineTo(0, 0);
  ctx.fillStyle = sweepGrad;
  ctx.fill();
  ctx.restore();

  // 第四層：波紋動畫
  for (let i = radarState.pings.length - 1; i >= 0; i--) {
    const p = radarState.pings[i];
    p.radius += 2.2;
    p.alpha -= 0.025;
    if (p.alpha <= 0) {
      radarState.pings.splice(i, 1);
      continue;
    }
    ctx.beginPath();
    ctx.arc(p.x * cw, p.y * ch, p.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(242, 183, 5, ${p.alpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  requestAnimationFrame(drawRadar);
}

// 🔥 任務三：命中偵測（加入 1000ms 冷卻）
function detectHitByAngle() {
  const now = Date.now();
  if (now - lastHeatTime < 1000) return; // 1秒內不重複觸發

  const currentAngle = radarState.angle % (Math.PI * 2);
  const hitCity = radarState.cities.find(c => Math.abs(currentAngle - c.targetAngle) < 0.12);

  if (hitCity && radarState.lastHitZone !== hitCity.name) {
    radarState.lastHitZone = hitCity.name;
    lastHeatTime = now; // 更新最後觸發時間
    triggerScan(null, false, hitCity);
  } else if (!hitCity) {
    radarState.lastHitZone = null;
  }
}

// ==========================================
// 3. UI 與 數據處理
// ==========================================
function updateDOM(topic, score, source, cityName) {
  let color = score >= 90 ? "#27ae60" : (score < 75 ? "#e74c3c" : "#F59E0B");
  document.getElementById('intercept-content').innerHTML = `
    <div style="font-size:12px; color:#888;">📡 來源：${source} ｜ ${cityName}</div>
    <b style="font-size:1.1em;">${topic}</b>
    <div style="font-size:36px; color:${color}; font-weight:bold; margin: 8px 0;">${score}</div>
    <div style="color:${color}; font-weight:bold; font-size:13px; border-left: 3px solid ${color}; padding-left: 10px;">
      AI 分析：市場聲量正常，維持監控。
    </div>
  `;

  radarState.rankings[topic] = score;
  const sorted = Object.entries(radarState.rankings).sort((a, b) => b[1] - a[1]).slice(0, 5);
  let html = "<b>🔥 戰略熱度榜</b><br><br>";
  sorted.forEach((item, i) => {
    html += `<div class="ranking-row"><span>${["🥇","🥈","🥉"][i]||"▪️"} ${item[0]}</span> <b>${item[1]}</b></div>`;
  });
  document.getElementById('ranking-content').innerHTML = html;
}

window.triggerScan = function(manualTopic = null, isManualSearch = false, targetCity = null) {
  const inputElem = document.getElementById('keywordInput');
  const inputValue = inputElem ? inputElem.value : "";
  
  const city = targetCity || radarState.cities[Math.floor(Math.random() * radarState.cities.length)];
  const topic = manualTopic || inputValue || city.name + "｜" + radarState.keywords[Math.floor(Math.random() * radarState.keywords.length)];
  const score = Math.floor(Math.random() * 40) + 60;
  const source = isManualSearch ? "手動偵測" : radarState.sources[Math.floor(Math.random() * radarState.sources.length)];

  // 1. 動畫
  radarState.pings.push({ x: city.x, y: city.y, radius: 0, alpha: 1 });

  // 🔥 任務一：降低熱度成長
  const existing = radarState.heatmap.find(p => Math.abs(p.x - city.x) < 0.05);
  if (existing) {
    existing.intensity = Math.min(existing.intensity + 0.4, 2.5); // 修復：壓低數值
  } else {
    radarState.heatmap.push({ x: city.x, y: city.y, intensity: 0.8 });
  }

  // 2. UI 更新
  updateDOM(topic, score, source, city.name);

  // 3. 搜尋紀錄
  if(isManualSearch && inputValue) {
    if(!radarState.searchHistory.includes(inputValue)) {
      radarState.searchHistory.unshift(inputValue);
      if(radarState.searchHistory.length > 3) radarState.searchHistory.pop();
    }
    inputElem.value = "";
  }
}

document.getElementById('keywordInput')?.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') triggerScan(null, true);
});

// 啟動
requestAnimationFrame(drawRadar);
setTimeout(() => triggerScan(), 500);

</script>
</body>
</html>
