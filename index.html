<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiangKe Food Radar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;800&display=swap');

:root {
  --bg:#FFF8F1;
  --card:#FFFFFF;
  --primary:#F59E0B;
  --accent:#10B981;
  --danger:#EF4444;
  --text:#3A3A3A;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
}

header {
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  background:white;
  border-bottom:1px solid #eee;
}

.hero {
  padding:30px;
  text-align:center;
}

.search-box input {
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.search-box button {
  padding:10px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
}

main {
  display:grid;
  grid-template-columns:1fr 350px;
}

.panel {
  padding:20px;
}

.card {
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

#map {
  height:500px;
  border-radius:12px;
}

@keyframes fadeSlideIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

.ai-card {
  animation:fadeSlideIn .4s ease;
}
</style>
</head>

<body>

<header>
  <div>🍽️ 饗客智擎</div>
  <div>● AI市場雷達</div>
</header>

<section class="hero">
  <h2>美食市場趨勢分析</h2>

  <div class="search-box">
    <input id="keywordInput" placeholder="輸入美食關鍵字">
    <button onclick="searchKeyword()">搜尋</button>
  </div>
</section>

<main>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">

  <div id="mainResult" class="card">
    請輸入關鍵字或點擊地圖事件
  </div>

  <div id="ai"></div>

</div>

</main>

<script>

var map = L.map('map').setView([23.7,121],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const cities=[
  {name:"台北",lat:25.03,lng:121.56},
  {name:"台中",lat:24.15,lng:120.67},
  {name:"高雄",lat:22.63,lng:120.30}
];

const foods=["雞排","飲料","火鍋","拉麵","甜點"];

async function getAI(msg){
  try{
    const res=await fetch("https://xiangke-api-production.up.railway.app/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });
    const data=await res.json();
    return data.reply || "市場上升";
  }catch{
    return "AI分析：市場趨勢上升";
  }
}

function showResult(title,text){

  const main=document.getElementById("mainResult");

  main.innerHTML="🔄 分析中...";

  setTimeout(()=>{
    main.innerHTML=`
      <b>${title}</b><br><br>
      ${text}<br><br>
      👉 建議：可嘗試投入或增加曝光
    `;
  },300);
}

function addCard(title,text){
  const ai=document.getElementById("ai");

  const card=document.createElement("div");
  card.className="ai-card";

  card.innerHTML=`<b>${title}</b><br>${text}`;

  ai.prepend(card);
}

function spawnMapEvent(){

  const city=cities[Math.floor(Math.random()*cities.length)];
  const food=foods[Math.floor(Math.random()*foods.length)];

  const marker=L.circleMarker([city.lat,city.lng],{
    radius:10,
    color:"orange",
    fillOpacity:0.7
  }).addTo(map);

  marker.on("click",()=>{
    getAI(food+" 在 "+city.name+" 趨勢").then(res=>{
      showResult("📍 "+city.name+"｜"+food,res);
      addCard(food,res);
    });
  });

  setTimeout(()=>map.removeLayer(marker),5000);
}

setInterval(spawnMapEvent,3000);

function searchKeyword(){
  const input=document.getElementById("keywordInput").value;
  if(!input) return;

  getAI(input+" 市場趨勢").then(res=>{
    showResult("🔍 "+input,res);
    addCard(input,res);
  });
}

document.getElementById("keywordInput")
  .addEventListener("keypress",function(e){
    if(e.key==="Enter") searchKeyword();
});

</script>

</body>
</html>
