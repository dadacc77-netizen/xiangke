<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiangKe 重生版</title>

<style>
body { margin:0; font-family:sans-serif; background:#FFF8F1; }

header {
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
}

.hero { text-align:center; padding:20px; }

#map {
  height:400px;
  position:relative;
  background:url('https://upload.wikimedia.org/wikipedia/commons/7/79/Taiwan_location_map.svg') center/contain no-repeat;
}

.dot {
  width:12px;
  height:12px;
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  animation:pulse 1.2s infinite;
}

@keyframes pulse {
  0% {transform:translate(-50%,-50%) scale(1);}
  50% {transform:translate(-50%,-50%) scale(1.5);}
  100% {transform:translate(-50%,-50%) scale(1);}
}

main {
  display:grid;
  grid-template-columns:1fr 320px;
}

.panel { padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  transition:0.3s;
}
</style>
</head>

<body>

<header>
  <b>🍽️ 饗客智擎（穩定重生版）</b>
</header>

<section class="hero">
  <input id="keywordInput" placeholder="輸入關鍵字">
  <button onclick="searchKeyword()">搜尋</button>
</section>

<main>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">
  <div id="mainResult" class="card">系統穩定運作中 ✅</div>
  <div id="ranking" class="card">🔥 排行榜</div>
</div>

</main>

<script>

const cities=[
  {name:"台北",x:50,y:20},
  {name:"台中",x:45,y:45},
  {name:"高雄",x:48,y:75}
];

const foods=["雞排","飲料","火鍋","甜點"];

let rankingData={};
let dots=[];
let timer=null;

// 🔥 啟動系統（只會跑一次）
function startSystem(){

  if(timer) return; // ❗ 防止重複啟動

  timer = setInterval(()=>{
    spawn();
  },3000);

}

function spawn(){

  const map=document.getElementById("map");

  // ❗ 控制最多5個點
  if(dots.length>=5){
    const old=dots.shift();
    old.remove();
  }

  const city=cities[Math.floor(Math.random()*cities.length)];
  const food=foods[Math.floor(Math.random()*foods.length)];

  const dot=document.createElement("div");
  dot.className="dot";

  dot.style.left=city.x+"%";
  dot.style.top=city.y+"%";
  dot.style.background=Math.random()>0.5?"green":"red";

  dot.onclick=()=>{
    showResult(city.name+"｜"+food);
  };

  map.appendChild(dot);
  dots.push(dot);
}

// 🔥 顯示結果
function showResult(title){

  const score = Math.floor(Math.random()*40)+60;

  let color = score>85?"green":score<70?"red":"#999";

  document.getElementById("mainResult").innerHTML=`
    <b>${title}</b><br>
    <div style="font-size:30px;color:${color}">
      ${score}分
    </div>
  `;

  updateRanking(title,score);
}

// 📊 排行榜
function updateRanking(name,score){

  rankingData[name]=score;

  const sorted = Object.entries(rankingData)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  let html="<b>🔥 熱門排行榜</b><br>";

  sorted.forEach((item,i)=>{
    html+=`${["🥇","🥈","🥉"][i]||""} ${item[0]} (${item[1]}分)<br>`;
  });

  document.getElementById("ranking").innerHTML=html;
}

// 🔍 搜尋
function searchKeyword(){

  const input=document.getElementById("keywordInput").value;
  if(!input) return;

  showResult("🔍 "+input);
}

// Enter
document.getElementById("keywordInput")
  .addEventListener("keypress",function(e){
    if(e.key==="Enter") searchKeyword();
});

// 啟動
startSystem();

</script>

</body>
</html>
