<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiangKe Food Radar</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;800&display=swap');

:root {
  --bg:#FFF8F1;
  --card:#FFFFFF;
  --primary:#F59E0B;   /* 溫暖橘 */
  --accent:#10B981;    /* 食物綠 */
  --danger:#EF4444;
  --text:#3A3A3A;
}

body {
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC',sans-serif;
}

header {
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  background:white;
  border-bottom:1px solid #eee;
}

.hero {
  padding:40px 20px;
  text-align:center;
}

.hero h1 {
  font-size:34px;
}

.hero-sub {
  color:var(--primary);
  margin-top:10px;
  font-size:18px;
}

.hero-desc {
  margin-top:10px;
  color:#777;
}

.search-box {
  margin-top:20px;
}

.search-box input {
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  width:200px;
}

.search-box button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

main {
  display:grid;
  grid-template-columns:260px 1fr 300px;
}

.panel {
  padding:20px;
}

.card {
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.radar {
  width:350px;
  height:350px;
  border-radius:50%;
  border:2px solid var(--primary);
  position:relative;
  margin:auto;
}

.scan {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  background:conic-gradient(from 0deg,transparent 70%,rgba(245,158,11,.3));
  animation:spin 4s linear infinite;
}

@keyframes spin {100%{transform:rotate(360deg)}}

.blip {
  width:10px;
  height:10px;
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
}

.ai-card {
  background:var(--card);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>🍽️ 饗客智擎</div>
  <div>● 即時分析</div>
</header>

<section class="hero">
  <h1>美食市場 AI 雷達</h1>
  <div class="hero-sub">幫你找出現在最夯的餐飲機會</div>
  <div class="hero-desc">輸入關鍵字，立即分析市場趨勢與商機</div>

  <div class="search-box">
    <input id="keywordInput" placeholder="例如：雞排、飲料">
    <button onclick="searchKeyword()">搜尋</button>
  </div>
</section>

<main>

<div class="panel">
  <div class="card">營收：<span id="rev">0</span></div>
  <div class="card">流量：<span id="tra">0</span></div>
  <div class="card">風險：<span id="risk">0%</span></div>
</div>

<div class="panel">
  <div class="radar" id="radar">
    <div class="scan"></div>
  </div>
</div>

<div class="panel">

  <div class="card">
    <b>📊 市場建議</b><br>
    建議優先觀察熱門品項，提前布局市場
  </div>

  <div id="ai"></div>

</div>

</main>

<script>

let stats={rev:1000000,tra:30000,risk:1.2};

function updateUI(){
  rev.innerText=stats.rev.toLocaleString();
  tra.innerText=stats.tra.toLocaleString();
  risk.innerText=stats.risk.toFixed(2)+"%";
}

async function getAI(msg){
  try{
    const res=await fetch("https://xiangke-api-production.up.railway.app/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });
    const data=await res.json();
    return data.reply || "市場需求上升";
  }catch{
    return "AI分析：市場需求上升";
  }
}

function searchKeyword(){
  const input=document.getElementById("keywordInput").value;
  if(!input) return;

  getAI(input+" 市場趨勢").then(res=>{
    const ai=document.getElementById("ai");

    const card=document.createElement("div");
    card.className="ai-card";

    card.innerHTML=`
      <b>🔍 ${input}</b><br>
      ${res}
    `;

    ai.prepend(card);
  });
}

function spawn(){

  const radar=document.getElementById("radar");

  const x=Math.random()*300;
  const y=Math.random()*300;

  const blip=document.createElement("div");
  blip.className="blip";
  blip.style.left=x+"px";
  blip.style.top=y+"px";
  blip.style.background=Math.random()>0.7?"var(--danger)":"var(--accent)";

  radar.appendChild(blip);
  setTimeout(()=>blip.remove(),3000);

  stats.rev+=5000;
  stats.tra+=300;
  stats.risk=Math.max(0,stats.risk+(Math.random()-0.5));

  updateUI();
}

setInterval(spawn,3000);
updateUI();

</script>

</body>
</html>
