<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiangKe 修復版</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#FFF8F1;
}

header {
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
}

.hero {
  text-align:center;
  padding:20px;
}

#map {
  height:400px;
  background:#eee;
  position:relative;
}

.dot {
  width:12px;
  height:12px;
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
}

main {
  display:grid;
  grid-template-columns:1fr 300px;
}

.panel {
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <b>🍽️ 饗客智擎（修復版）</b>
</header>

<section class="hero">
  <input id="keywordInput" placeholder="輸入關鍵字">
  <button onclick="searchKeyword()">搜尋</button>
</section>

<main>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">
  <div id="mainResult" class="card">系統已恢復 ✅</div>
</div>

</main>

<script>

// 固定三個點（不動）
const points = [
  {name:"台北", x:50, y:20},
  {name:"台中", x:45, y:45},
  {name:"高雄", x:48, y:75}
];

// 初始化畫面
window.onload = function(){

  const map = document.getElementById("map");

  points.forEach(p=>{
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.style.left = p.x + "%";
    dot.style.top = p.y + "%";
    dot.style.background = "orange";

    dot.onclick = ()=>{
      showResult(p.name);
    };

    map.appendChild(dot);
  });

};

// 顯示結果（最簡版）
function showResult(text){

  const score = Math.floor(Math.random()*40)+60;

  document.getElementById("mainResult").innerHTML = `
    <b>${text}</b><br>
    <div style="font-size:28px;color:#F59E0B">${score}分</div>
    系統正常運作
  `;
}

// 搜尋
function searchKeyword(){

  const input = document.getElementById("keywordInput").value;
  if(!input) return;

  showResult("🔍 " + input);
}

// Enter
document.getElementById("keywordInput")
  .addEventListener("keypress", function(e){
    if(e.key==="Enter") searchKeyword();
  });

</script>

</body>
</html>
