<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XiangKe 最終版</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#FFF8F1;
}

header {
  padding:15px;
  background:white;
  border-bottom:1px solid #eee;
}

.hero {
  text-align:center;
  padding:20px;
}

#map {
  height:400px;
  position:relative;
  background:url('https://upload.wikimedia.org/wikipedia/commons/7/79/Taiwan_location_map.svg') center/contain no-repeat;
}

.dot {
  width:14px;
  height:14px;
  border-radius:50%;
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0% {transform:translate(-50%,-50%) scale(1);}
  50% {transform:translate(-50%,-50%) scale(1.6);}
  100% {transform:translate(-50%,-50%) scale(1);}
}

.explode {
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:orange;
  animation:boom 0.5s forwards;
}

@keyframes boom {
  from {transform:scale(1); opacity:1;}
  to {transform:scale(4); opacity:0;}
}

main {
  display:grid;
  grid-template-columns:1fr 320px;
}

.panel {
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

.news-item {
  font-size:13px;
  margin-bottom:5px;
}
</style>
</head>

<body>

<header>
  <b>🍽️ 饗客智擎（最終版）</b>
</header>

<section class="hero">
  <input id="keywordInput" placeholder="輸入關鍵字">
  <button onclick="searchKeyword()">搜尋</button>
</section>

<main>

<div class="panel">
  <div id="map"></div>
</div>

<div class="panel">

  <div id="mainResult" class="card">系統運作中...</div>
  <div id="ranking" class="card">🔥 排行榜</div>
  <div id="news" class="card">📰 即時動態</div>

</div>

</main>

<script>

const cities=[
  {name:"台北",x:50,y:20},
  {name:"台中",x:45,y:45},
  {name:"高雄",x:48,y:75}
];

const foods=["雞排","飲料","火鍋","甜點"];
let rankingData={};

// 🔥 主結果 + AI感
function showResult(title){

  const score = Math.floor(Math.random()*40)+60;

  let level="🟡 普通";
  let color="#999";

  if(score > 85){
    level="🔥 爆紅機會";
    color="green";
  }else if(score < 70){
    level="⚠️ 風險偏高";
    color="red";
  }

  document.getElementById("mainResult").innerHTML=`
    <b>${title}</b><br>
    <div style="font-size:32px;color:${color}">
      ${score}分
    </div>
    ${level}<br>
    👉 建議：${score>80?"立刻進場":"觀察市場"}
  `;

  updateRanking(title,score);
}

// 📊 排行榜（跳動）
function updateRanking(name,score){

  rankingData[name]=score;

  const sorted = Object.entries(rankingData)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  let html="<b>🔥 熱門排行榜</b><br>";

  sorted.forEach((item,i)=>{

    let medal=["🥇","🥈","🥉"][i] || "";

    html+=`${medal} ${item[0]} (${item[1]}分)<br>`;
  });

  document.getElementById("ranking").innerHTML=html;
}

// 💥 爆炸動畫
function explode(x,y){

  const map=document.getElementById("map");

  const boom=document.createElement("div");
  boom.className="explode";

  boom.style.left=x+"%";
  boom.style.top=y+"%";

  map.appendChild(boom);

  setTimeout(()=>boom.remove(),500);
}

// 🔥 動態點
function spawn(){

  const map=document.getElementById("map");

  const city=cities[Math.floor(Math.random()*cities.length)];
  const food=foods[Math.floor(Math.random()*foods.length)];

  const dot=document.createElement("div");
  dot.className="dot";

  dot.style.left=city.x+"%";
  dot.style.top=city.y+"%";
  dot.style.background=Math.random()>0.5?"green":"red";

  dot.onclick=()=>{
    explode(city.x,city.y);
    showResult(city.name+"｜"+food);
    pushNews(food);
  };

  map.appendChild(dot);

  setTimeout(()=>dot.remove(),3000);
}

setInterval(spawn,2000);

// 📰 假新聞
function pushNews(food){

  const news=document.getElementById("news");

  const item=document.createElement("div");
  item.className="news-item";

  item.innerText="📰 "+food+" 討論度暴增";

  news.prepend(item);

  if(news.children.length>6){
    news.removeChild(news.lastChild);
  }
}

// 🔍 搜尋
function searchKeyword(){

  const input=document.getElementById("keywordInput").value;
  if(!input) return;

  showResult("🔍 "+input);
  pushNews(input);
}

// Enter
document.getElementById("keywordInput")
  .addEventListener("keypress",function(e){
    if(e.key==="Enter") searchKeyword();
});

</script>

</body>
</html>
